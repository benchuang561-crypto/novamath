<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaMath</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="particles"></div>
  <nav class="navbar"><h1 class="logo">NovaMath</h1></nav>
  <main>
    <section class="hero">
      <h1>Master Math, Step by Step</h1>
      <p>Interactive lessons, practice, and progress tracking.</p>
      <div class="stats">
        <div class="stat"><span class="stat-number" data-target="4">0</span> Courses</div>
        <div class="stat"><span class="stat-number" data-target="50">0</span> Units</div>
        <div class="stat"><span class="stat-number" data-target="120">0</span> Lessons</div>
      </div>
    </section>
    <section class="courses-grid">
      <div class="course-card" data-course="algebra1">
        <h2>Algebra 1</h2>
        <div class="progress-container"><div class="progress-bar"></div></div>
        <svg class="progress-ring" width="120" height="120">
          <circle class="ring-fill" data-course-key="algebra1" cx="60" cy="60" r="52" stroke="#00d4ff" stroke-width="8" fill="transparent" stroke-dasharray="326.73" stroke-dashoffset="326.73"></circle>
        </svg>
      </div>
      <div class="course-card" data-course="algebra2">
        <h2>Algebra 2</h2>
        <div class="progress-container"><div class="progress-bar"></div></div>
        <svg class="progress-ring" width="120" height="120">
          <circle class="ring-fill" data-course-key="algebra2" cx="60" cy="60" r="52" stroke="#a855f7" stroke-width="8" fill="transparent" stroke-dasharray="326.73" stroke-dashoffset="326.73"></circle>
        </svg>
      </div>
      <div class="course-card" data-course="geometry">
        <h2>Geometry</h2>
        <div class="progress-container"><div class="progress-bar"></div></div>
        <svg class="progress-ring" width="120" height="120">
          <circle class="ring-fill" data-course-key="geometry" cx="60" cy="60" r="52" stroke="#22c55e" stroke-width="8" fill="transparent" stroke-dasharray="326.73" stroke-dashoffset="326.73"></circle>
        </svg>
      </div>
      <div class="course-card" data-course="precalculus">
        <h2>Precalculus</h2>
        <div class="progress-container"><div class="progress-bar"></div></div>
        <svg class="progress-ring" width="120" height="120">
          <circle class="ring-fill" data-course-key="precalculus" cx="60" cy="60" r="52" stroke="#f97316" stroke-width="8" fill="transparent" stroke-dasharray="326.73" stroke-dashoffset="326.73"></circle>
        </svg>
      </div>
    </section>
  </main>
  <script>
    document.querySelectorAll('.course-card').forEach(card => {
      card.addEventListener('click', () => {
        const course = card.dataset.course;
        window.location.href = `course.html?course=${course}`;
      });
    });
  </script>
  <script src="app.js"></script>
</body>
</html>
